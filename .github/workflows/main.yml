name: build
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package:
        description: Package to bump and build
        required: true
        type: string
      version:
        description: New pkgver to set before build
        required: true
        type: string

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: resolve package matrix
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - uses: actions/checkout@v3
      - id: packages
        run: |
          PACKAGE="${{ github.event.inputs.package }}"

          if [ -n "$PACKAGE" ]; then
            if [ ! -f "$PACKAGE/PKGBUILD" ]; then
              echo "Package '$PACKAGE' does not exist or has no PKGBUILD" >&2
              exit 1
            fi
            PACKAGES=$(printf '["%s"]' "$PACKAGE")
          else
            PACKAGES=$(python3 -c 'import json; from pathlib import Path; pkgs = sorted(p.parent.name for p in Path(".").glob("*/PKGBUILD")); print(json.dumps(pkgs))')
          fi

          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
  build:
    name: build
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.prepare.outputs.packages) }}

    permissions:
      contents: write

    env:
      # List of packages which will be auto-published to the AUR. Must be a
      # JSON string because env vars are strings in GitHub Actions.
      auto_publish: '["things3-cloud", "tmux-ai-titles"]'
      GPG_PACKAGE_SIGNING_KEY: ${{ secrets.GPG_PACKAGE_SIGNING_KEY }}

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Bump PKGBUILD version and checksums
        if: github.event_name == 'workflow_dispatch'
        run: |
          PACKAGE="${{ matrix.package }}"
          VERSION="${{ github.event.inputs.version }}"
          PKGBUILD_PATH="${PACKAGE}/PKGBUILD"

          python3 - "$PKGBUILD_PATH" "$VERSION" <<'PY'
          from pathlib import Path
          import re
          import sys

          path = Path(sys.argv[1])
          version = sys.argv[2]
          text = path.read_text()

          text, pkgver_count = re.subn(r'^pkgver=.*$', f'pkgver={version}', text, count=1, flags=re.MULTILINE)
          if pkgver_count != 1:
            raise SystemExit(f"Failed to update pkgver in {path}")

          text, _ = re.subn(r'^pkgrel=.*$', 'pkgrel=1', text, count=1, flags=re.MULTILINE)
          path.write_text(text)
          PY

          RUNNER_UID="$(id -u)"
          RUNNER_GID="$(id -g)"
          docker run --rm \
            -e RUNNER_UID="$RUNNER_UID" \
            -e RUNNER_GID="$RUNNER_GID" \
            -v "${{ github.workspace }}/${PACKAGE}:/pkg" \
            -w /pkg \
            archlinux:base-devel \
            /bin/bash -c '\
              set -e
              pacman-key --init && \
              pacman-key --populate && \
              pacman -Syu --noconfirm && \
              pacman -S --noconfirm pacman-contrib sudo && \
              useradd -m builder && \
              chown -R builder:builder /pkg && \
              su builder -c "cd /pkg && updpkgsums" && \
              chown -R "$RUNNER_UID:$RUNNER_GID" /pkg'

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$PKGBUILD_PATH"
          if git diff --cached --quiet; then
            echo "No PKGBUILD/checksum changes detected for ${PACKAGE}"
          else
            git commit -m "${PACKAGE}: bump to v${VERSION}"

            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Build package
        run: |
          docker run --rm \
            -e GPG_PACKAGE_SIGNING_KEY="${{ env.GPG_PACKAGE_SIGNING_KEY }}" \
            -e PACKAGE_DIR="/pkgs/${{ matrix.package }}" \
            -v ${{ github.workspace }}:/pkgs \
            -w /pkgs \
            archlinux:base-devel \
            /bin/bash /pkgs/.github/scripts/build-package-in-container.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-pkgs
          path: |
            ${{ github.workspace }}/${{ matrix.package }}/*.pkg.tar.zst
            ${{ github.workspace }}/${{ matrix.package }}/*.pkg.tar.zst.sig
          if-no-files-found: error

      # Publish to AUR using the aur-push script with SSH key
      - name: Publish to AUR
        if: ${{ contains(fromJSON(env.auto_publish), matrix.package) }}
        run: |
          git fetch --prune
          docker run --rm \
            -e PRIVATE_KEY_AUR="${{ secrets.PRIVATE_KEY_AUR }}" \
            -e PACKAGE="${{ matrix.package }}" \
            -v ${{ github.workspace }}:/pkgs \
            -w /pkgs \
            archlinux:base-devel \
            /bin/bash /pkgs/.github/scripts/publish-in-container.sh

  publish-repo:
    name: publish pacman repo release
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pacman-repo-release
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      RELEASE_TAG: pacman-repo
      REPO_DB_NAME: evanpurkhiser

    steps:
      - name: Download newly built package artifacts
        uses: actions/download-artifact@v4
        with:
          path: new-artifacts
          merge-multiple: true

      - name: Download current release packages
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p old-packages
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            mapfile -t package_assets < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name | select(test("\\.pkg\\.tar\\.zst(\\.sig)?$"))')
            for asset in "${package_assets[@]}"; do
              gh release download "$RELEASE_TAG" --dir old-packages --pattern "$asset"
            done
          else
            echo "No existing release '$RELEASE_TAG' found. Starting with only newly built packages."
          fi

      - name: Merge package sets and generate pacman repo database
        env:
          GPG_PACKAGE_SIGNING_KEY: ${{ secrets.GPG_PACKAGE_SIGNING_KEY }}
        run: |
          set -euo pipefail

          mkdir -p repo/x86_64

          shopt -s nullglob

          for pkg in old-packages/*.pkg.tar.zst; do
            cp -f "$pkg" repo/x86_64/
          done

          for sig in old-packages/*.pkg.tar.zst.sig; do
            cp -f "$sig" repo/x86_64/
          done

          new_pkgs=(new-artifacts/*.pkg.tar.zst)

          if [ ${#new_pkgs[@]} -eq 0 ]; then
            echo "No newly built package artifacts were found."
            exit 1
          fi

          for pkg in "${new_pkgs[@]}"; do
            cp -f "$pkg" repo/x86_64/

            sig_path="${pkg}.sig"
            if [ -f "$sig_path" ]; then
              cp -f "$sig_path" repo/x86_64/
            else
              echo "Missing signature for newly built package: ${pkg}"
              exit 1
            fi
          done

          docker run --rm \
            -e REPO_DB_NAME="$REPO_DB_NAME" \
            -e GPG_PACKAGE_SIGNING_KEY="$GPG_PACKAGE_SIGNING_KEY" \
            -v "$PWD:/work" \
            -w /work \
            archlinux:base-devel \
            /bin/bash /work/.github/scripts/publish-repo-in-container.sh

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            mapfile -t existing_assets < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')
            for asset in "${existing_assets[@]}"; do
              if [ ! -f "repo/x86_64/${asset}" ]; then
                gh release delete-asset "$RELEASE_TAG" "$asset" --yes
              fi
            done

            gh release upload "$RELEASE_TAG" repo/x86_64/* --clobber
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes "Automated pacman repository publish from ${GITHUB_SHA}." \
              repo/x86_64/*
          fi
